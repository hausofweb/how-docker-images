name: Build Check

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed image directories
        id: changes
        run: |
          DIRS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep 'Dockerfile$' \
            | xargs -I{} dirname {} \
            | sort -u \
            | jq -R . | jq -sc .)
          echo "dirs=${DIRS}" >> $GITHUB_OUTPUT
          echo "Detected directories: ${DIRS}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build changed images
        run: |
          echo '${{ steps.changes.outputs.dirs }}' | jq -r '.[]' | while read dir; do
            echo "Building $dir..."
            docker buildx build --platform linux/amd64,linux/arm64 "$dir"
          done