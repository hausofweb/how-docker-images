name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:


permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      actions-runner--release_created: ${{ steps.release.outputs['actions-runner--release_created'] }}
      actions-runner--tag_name: ${{ steps.release.outputs['actions-runner--tag_name'] }}
      actions-runner--version: ${{ steps.release.outputs['actions-runner--version'] }}
      actions-runner--major: ${{ steps.release.outputs['actions-runner--major'] }}
      actions-runner--minor: ${{ steps.release.outputs['actions-runner--minor'] }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.TOKEN_APP_ID }}
          private-key: ${{ secrets.TOKEN_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-config.json
          manifest-file: .release-manifest.json

  build-push:
    needs: release-please
    if: ${{ needs.release-please.outputs['actions-runner--release_created'] }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/actions-runner
          tags: |
            type=raw,value=${{ needs.release-please.outputs['actions-runner--version'] }}
            type=raw,value=${{ needs.release-please.outputs['actions-runner--major'] }}.${{ needs.release-please.outputs['actions-runner--minor'] }}
            type=raw,value=${{ needs.release-please.outputs['actions-runner--major'] }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: actions-runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag-major-minor:
    needs: release-please
    if: ${{ needs.release-please.outputs['actions-runner--release_created'] }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.TOKEN_APP_ID }}
          private-key: ${{ secrets.TOKEN_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Tag major and minor versions
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          MAJOR=${{ needs.release-please.outputs['actions-runner--major'] }}
          MINOR=${{ needs.release-please.outputs['actions-runner--minor'] }}
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -d actions-runner@${MAJOR} || true
          git tag -d actions-runner@${MAJOR}.${MINOR} || true
          git push origin :actions-runner@${MAJOR} || true
          git push origin :actions-runner@${MAJOR}.${MINOR} || true
          git tag -a actions-runner@${MAJOR} -m "Release actions-runner@${MAJOR}"
          git tag -a actions-runner@${MAJOR}.${MINOR} -m "Release actions-runner@${MAJOR}.${MINOR}"
          git push origin actions-runner@${MAJOR}
          git push origin actions-runner@${MAJOR}.${MINOR}